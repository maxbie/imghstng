<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <img src="https://api.teletext.ch/online/pics/large/SRF1_130-0.gif" id="tt">
  <script>
    setInterval(() => {
      document.getElementById('tt').src = 
        'https://api.teletext.ch/online/pics/large/SRF1_130-0.gif?' + Date.now();
    }, 60000);
  </script>
</body>
</html>
